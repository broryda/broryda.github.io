<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF Problem Viewer</title>
    <!-- WGo.js (Local) -->
    <script type="text/javascript" src="/lib/wgo.js"></script>
    <link type="text/css" rel="stylesheet" href="/lib/wgo.css" />

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f0f0f0;
        }

        #sidebar {
            width: 300px;
            background-color: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #header {
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            font-weight: bold;
        }

        #file-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #file-list li {
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 14px;
        }

        #file-list li:hover {
            background-color: #f5f5f5;
        }

        #file-list li.active {
            background-color: #3498db;
            color: white;
        }

        #main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #e9e9e9;
        }

        #player-container {
            width: 100%;
            max-width: 800px; /* Adjust based on board size preference */
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 4px;
        }

        #current-file {
            margin-bottom: 10px;
            font-size: 1.2em;
            color: #333;
            font-weight: bold;
        }
        
        .wgo-player-main {
             width: 100%;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="header">SGF Problems</div>
        <ul id="file-list">
            <!-- Files will be loaded here -->
            <li style="padding:20px; text-align:center; color:#888;">Loading...</li>
        </ul>
    </div>

    <div id="main">
        <div id="current-file">Select a problem to start</div>
        <div id="player-container">
            <div id="player" style="width: 100%"></div>
        </div>
    </div>

    <script>
        let currentProblemPlayer = null;

        class ProblemPlayer {
            constructor(container, sgfContent) {
                this.container = container;
                this.container.innerHTML = ''; // Clear container
                this.sgfContent = sgfContent;
                this.board = null;
                this.game = null;
                this.rootNode = null;
                this.currentNode = null;
                this.boardState = []; // Track stones for fast updates

                this.init();
            }

            init() {
                try {
                    // Parse SGF
                    this.rootNode = WGo.KifuNode.fromSGF(this.sgfContent);
                    this.currentNode = this.rootNode;

                    // Determine board size from SGF (SZ property)
                    let size = 19;
                    if (this.rootNode.properties['SZ']) {
                        size = parseInt(this.rootNode.properties['SZ'][0], 10);
                    }

                    // Initialize Game
                    this.game = new WGo.Game(size);

                    // Create Board UI
                    const boardConfig = {
                        width: 600,
                        height: 600,
                        size: size,
                        theme: {
                            backgroundColor: '#DCB35C'
                        }
                    };
                    
                    this.board = new WGo.SVGBoard(this.container, boardConfig);
                    
                    // FIX: Manually calculate and inject field dimensions for SVGBoard 3.x
                    // This prevents 'scale(undefined)' errors in draw handlers
                    const computedFieldWidth = boardConfig.width / size;
                    const computedFieldHeight = boardConfig.height / size;
                    this.board.fieldWidth = computedFieldWidth;
                    this.board.fieldHeight = computedFieldHeight;
                    
                    if (this.board.config) {
                        this.board.config.fieldWidth = computedFieldWidth;
                        this.board.config.fieldHeight = computedFieldHeight;
                    }
                    
                    // Apply initial setup
                    this.applyNode(this.rootNode);

                    // Add click listener
                    // WGo 3.x SVGBoard uses .on(event, callback)
                    this.board.on('click', (event, point) => {
                        this.handleBoardClick(point.x, point.y);
                    });

                } catch (e) {
                    console.error("Initialization Error:", e);
                    alert("Error initializing problem: " + e.message);
                }
            }

            handleBoardClick(x, y) {
                // Check if it's user's turn (Black usually)
                // In problems, user follows variations.
                // Check children of current node for a move at (x, y)
                
                // Find matching child
                const nextNode = this.findChildMove(x, y);

                if (nextNode) {
                    // Valid move
                    this.playNode(nextNode);

                    // Check for response (opponent's move)
                    setTimeout(() => this.respond(), 500);
                } else {
                    // Invalid move
                    console.log("Invalid move at", x, y);
                    alert("오답입니다");
                    // Optional: Shake board or show feedback
                }
            }

            findChildMove(x, y) {
                for (const child of this.currentNode.children) {
                    // Check properties B or W
                    // WGo 3.x properties might be stored in 'properties' object
                    // B: ['pd'], W: ['dd']
                    let moveColor = null;
                    let moveCoord = null;

                    if (child.properties['B']) {
                        moveColor = WGo.Color.BLACK;
                        moveCoord = child.properties['B'][0];
                    } else if (child.properties['W']) {
                        moveColor = WGo.Color.WHITE;
                        moveCoord = child.properties['W'][0];
                    }

                    if (moveCoord) {
                        // Decode SGF coordinate
                        // 'pd' -> x=15, y=3 (0-indexed)
                        const decoded = this.decodeSgfCoord(moveCoord);
                        if (decoded.x === x && decoded.y === y) {
                            return child;
                        }
                    }
                }
                return null;
            }

            decodeSgfCoord(str) {
                if (!str || str.length < 2) return {x: -1, y: -1};
                const alphabet = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
                return {
                    x: alphabet.indexOf(str[0]),
                    y: alphabet.indexOf(str[1])
                };
            }

            playNode(node) {
                this.currentNode = node;
                this.applyNode(node);
                
                // Check comments for status
                if (node.properties['C']) {
                    const comment = node.properties['C'][0];
                    if (comment.includes('RIGHT')) {
                        setTimeout(() => alert("Correct! (RIGHT)"), 100);
                    } else if (comment.includes('FAIL')) {
                        setTimeout(() => alert("Incorrect. (FAIL)"), 100);
                    }
                }
            }

            respond() {
                // Check if there is only one child and it's opponent's move
                // Or if there's a preferred path. 
                // Usually problems have specific responses.
                if (this.currentNode.children.length > 0) {
                    // Pick the first child usually (main variation for response)
                    const responseNode = this.currentNode.children[0];
                    this.playNode(responseNode);
                }
            }

            applyNode(node) {
                // ... setup ...
                // Log for debugging
                console.log('Applying node:', node);
                
                // Handle setup properties
                if (node.properties['AB']) {
                    node.properties['AB'].forEach(coord => {
                        const c = this.decodeSgfCoord(coord);
                        this.game.addStone(c.x, c.y, WGo.Color.BLACK);
                    });
                }
                if (node.properties['AW']) {
                    node.properties['AW'].forEach(coord => {
                        const c = this.decodeSgfCoord(coord);
                        this.game.addStone(c.x, c.y, WGo.Color.WHITE);
                    });
                }

                // ... moves ...
                
                // Redraw
                this.redrawBoard();
            }

            redrawBoard() {
                this.board.removeAllObjects();
                
                const size = this.game.size;
                // Debug first few stones
                let stonesFound = 0;
                
                for (let x = 0; x < size; x++) {
                    for (let y = 0; y < size; y++) {
                        const stone = this.game.getStone(x, y);
                        if (stone !== 0 && stone !== null) { // Assuming 0 or null is empty
                            stonesFound++;
                            if (stone === WGo.Color.BLACK) {
                                this.board.addObject({x: x, y: y, type: "B"});
                            } else if (stone === WGo.Color.WHITE) {
                                this.board.addObject({x: x, y: y, type: "W"});
                            } else {
                                console.warn('Unknown stone value:', stone);
                            }
                        }
                    }
                }
                console.log(`Redraw complete. Found ${stonesFound} stones.`);
            }

            destroy() {
                this.container.innerHTML = '';
                this.board = null;
                this.game = null;
            }
        }

        // Fetch the list of files
        fetch('/api/files')
            .then(response => response.json())
            .then(files => {
                const list = document.getElementById('file-list');
                list.innerHTML = ''; // Clear loading message

                if (files.length === 0) {
                    list.innerHTML = '<li style="padding:20px;">No .sgf files found.</li>';
                    return;
                }

                files.forEach(file => {
                    const li = document.createElement('li');
                    li.textContent = file;
                    li.onclick = () => loadSgf(file, li);
                    list.appendChild(li);
                });
            })
            .catch(err => {
                console.error('Error fetching files:', err);
                document.getElementById('file-list').innerHTML = '<li style="color:red; padding:20px;">Error loading files.</li>';
            });

        function loadSgf(filename, listItem) {
            // Update active state in UI
            document.querySelectorAll('#file-list li').forEach(el => el.classList.remove('active'));
            if(listItem) listItem.classList.add('active');
            
            document.getElementById('current-file').textContent = filename;

            if (typeof WGo === 'undefined') {
                alert('WGo.js library is not loaded. Please check your internet connection.');
                return;
            }


            // Cleanup previous player
            if (currentProblemPlayer) {
                currentProblemPlayer.destroy();
                currentProblemPlayer = null;
            }

            fetch('/api/sgf/' + encodeURIComponent(filename))
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Server returned ${response.status}: ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(sgfContent => {
                    try {
                        const playerContainer = document.getElementById('player');
                        currentProblemPlayer = new ProblemPlayer(playerContainer, sgfContent);
                    } catch (e) {
                        console.error('ProblemPlayer Error:', e);
                        alert('Error loading problem: ' + e.message);
                    }
                })
                .catch(err => {
                    console.error('Error loading SGF:', err);
                    alert('Failed to load SGF file: ' + err.message);
                });
        }
    </script>

</body>
</html>
