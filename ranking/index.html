<!doctype html>
<html lang="ko">
  <head>

    <title>사활문제집 랭킹 API</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
        margin: 0;
        background: #f5fbfd;
        color: #1d2a33;
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }
      .card {
        background: #fff;
        border: 1px solid #d7eaf1;

        padding: 16px;
        margin-bottom: 14px;
      }
      code {
        background: #eef8fb;
        border-radius: 8px;
        padding: 2px 6px;
      }
      a { color: #0b8f93; }
      pre {
        overflow: auto;
        background: #f7fbfd;
        border: 1px solid #d7eaf1;
        border-radius: 12px;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>사활문제집 랭킹 API</h1>
      <div class="card">
        <p>앱에서 아래 JSON을 1시간 주기로 읽습니다.</p>
        <p><a href="./ranking.json">ranking.json 열기</a></p>
        <p>URL: <code>https://broryda.github.io/ranking/ranking.json</code></p>
      </div>
      <div class="card">
        <h2>JSON 형식</h2>
        <pre>{
  "updatedAt": "2026-04-26T12:30:00+09:00",
  "entries": [
    { "nickname": "닉네임", "solvedCount": 100, "elo": 1200 }
  ]
}</pre>
