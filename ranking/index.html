<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>사활문제집 랭킹</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
        margin: 0;
        background: #f5fbfd;
        color: #1d2a33;
      }
      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      .title {
        margin: 0 0 14px;
        font-size: 28px;
        font-weight: 800;
      }
      .card {
        background: #fff;
        border: 1px solid #d7eaf1;
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 12px;
        box-shadow: 0 6px 20px rgba(21, 50, 61, 0.05);
      }
      .meta {
        color: #607480;
        font-size: 13px;
      }
      .tab-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .tab-btn {
        border: 1px solid #c7e0e8;
        background: #eef8fb;
        color: #1d2a33;
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      .tab-btn.active {
        background: #56c3c8;
        border-color: #56c3c8;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid #e6f1f5;
        padding: 10px 8px;
        text-align: left;
      }
      th {
        color: #3f5661;
        font-size: 13px;
      }
      td.rank {
        width: 80px;
      }
      td.value,
      th.value {
        text-align: right;
        width: 120px;
      }
      .nick {
        max-width: 420px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .medal {
        font-size: 16px;
        margin-right: 6px;
      }
      .empty {
        padding: 16px 8px;
        color: #607480;
      }
      @media (max-width: 640px) {
        .title {
          font-size: 24px;
        }
        th,
        td {
          padding: 9px 6px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">사활문제집 랭킹</h1>

      <div class="card">
        <div id="updatedAt" class="meta">업데이트 시각: -</div>
      </div>

      <div class="card">
        <div class="tab-row">
          <button id="tab-elo" class="tab-btn active" data-sort="elo">ELO 랭킹</button>
          <button id="tab-solved" class="tab-btn" data-sort="solved">문제수 랭킹</button>
          <button id="tab-streak" class="tab-btn" data-sort="streak">연속 학습 랭킹</button>
        </div>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>순위</th>
              <th>닉네임</th>
              <th id="metricHeader" class="value">ELO</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <script>
      let entries = [];
      let sortKey = "elo";

      function toTs(v) {
        const t = Date.parse(String(v || ""));
        return Number.isFinite(t) ? t : Number.MAX_SAFE_INTEGER;
      }

      function medal(rank) {
        if (rank === 1) return "🥇";
        if (rank === 2) return "🥈";
        if (rank === 3) return "🥉";
        return "";
      }

      function sortEntries(src, key) {
        const out = [...src];
        if (key === "solved") {
          out.sort((a, b) => (b.solvedCount || 0) - (a.solvedCount || 0) || toTs(a.createdAt) - toTs(b.createdAt));
          return out;
        }
        if (key === "streak") {
          out.sort((a, b) => (b.streakCurrent || 0) - (a.streakCurrent || 0) || toTs(a.createdAt) - toTs(b.createdAt));
          return out;
        }
        out.sort((a, b) => (b.elo || 0) - (a.elo || 0) || toTs(a.createdAt) - toTs(b.createdAt));
        return out;
      }

      function render() {
        const metricHeader = document.getElementById("metricHeader");
        metricHeader.textContent = sortKey === "elo" ? "ELO" : sortKey === "solved" ? "문제수" : "연속 학습";

        const tbody = document.getElementById("rows");
        tbody.innerHTML = "";

        const rows = sortEntries(entries, sortKey).slice(0, 100);
        if (rows.length === 0) {
          const tr = document.createElement("tr");
          tr.innerHTML = '<td class="empty" colspan="3">랭킹 데이터가 없습니다.</td>';
          tbody.appendChild(tr);
          return;
        }

        rows.forEach((r, i) => {
          const tr = document.createElement("tr");
          const rank = i + 1;
          const m = medal(rank);
          const metricValue =
            sortKey === "elo" ? Number(r.elo || 0) : sortKey === "solved" ? Number(r.solvedCount || 0) : `${Number(r.streakCurrent || 0)}일`;
          tr.innerHTML = `
            <td class="rank">${rank}</td>
            <td class="nick">${m ? `<span class="medal">${m}</span>` : ""}${String(r.nickname || "")}</td>
            <td class="value">${metricValue}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      function setSort(next) {
        sortKey = next;
        document.querySelectorAll(".tab-btn").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.sort === sortKey);
        });
        render();
      }

      async function load() {
        try {
          const res = await fetch("./ranking_public.json", { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          entries = Array.isArray(data.entries) ? data.entries : [];
          document.getElementById("updatedAt").textContent = `업데이트 시각: ${data.updatedAt || "-"}`;
          render();
        } catch {
          document.getElementById("updatedAt").textContent = "업데이트 시각: 로딩 실패";
          entries = [];
          render();
        }
      }

      document.getElementById("tab-elo").addEventListener("click", () => setSort("elo"));
      document.getElementById("tab-solved").addEventListener("click", () => setSort("solved"));
      document.getElementById("tab-streak").addEventListener("click", () => setSort("streak"));
      load();
    </script>
  </body>
</html>
