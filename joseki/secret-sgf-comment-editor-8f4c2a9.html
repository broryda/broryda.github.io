<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#12100d" />
    <link rel="stylesheet" href="./assets/styles.css" />
    <title>정석 SGF/comment secret editor</title>
    <style>
      body {
        min-height: 100vh;
        padding: 1rem;
      }

      .secret-shell {
        max-width: 1280px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 1rem;
      }

      .secret-card {
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 1rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      }

      .secret-card h1,
      .secret-card h2,
      .secret-card h3 {
        margin-top: 0;
      }

      .secret-grid {
        display: grid;
        gap: 0.9rem;
      }

      .secret-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      .secret-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .secret-actions button,
      .secret-actions a {
        width: auto;
      }

      .secret-list {
        display: grid;
        gap: 0.45rem;
        max-height: 46vh;
        overflow: auto;
        padding-right: 0.25rem;
      }

      .secret-list button {
        text-align: left;
        padding: 0.75rem;
        border-radius: 14px;
        font-size: 0.95rem;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
      }

      .secret-list button.active {
        background: var(--accent);
        color: #1a1005;
      }

      .sgf-area {
        min-height: 15rem;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 0.9rem;
      }

      .comment-table {
        display: grid;
        gap: 0.65rem;
      }

      .comment-row {
        display: grid;
        grid-template-columns: 4.7rem 1fr;
        gap: 0.6rem;
        align-items: start;
      }

      .comment-row textarea {
        min-height: 4rem;
      }

      .status {
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 14px;
        padding: 0.75rem;
        background: rgba(0, 0, 0, 0.25);
        color: var(--muted);
      }

      .warning {
        color: #ffd18a;
      }

      @media (max-width: 960px) {
        .secret-shell,
        .secret-row,
        .comment-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="secret-shell">
      <aside class="secret-card secret-grid">
        <div class="brand">
          <h1>Secret SGF 편집</h1>
          <span>정석별 SGF와 코멘트를 수정한 뒤 GitHub에 커밋합니다.</span>
        </div>

        <p class="muted small warning">
          이 페이지는 메인 화면에 링크하지 않는 비공개용 페이지입니다. 단, GitHub Pages 정적 페이지라 URL 자체가
          보안 수단은 아닙니다. GitHub 토큰은 코드에 저장하지 않고 커밋 요청에만 사용합니다.
        </p>

        <label>
          종류별 정석
          <select id="categorySelect"></select>
        </label>

        <label>
          정석 선택
          <input id="searchInput" placeholder="번호, 제목, 파일명 검색" />
        </label>
        <div id="josekiList" class="secret-list"></div>

        <section class="secret-grid">
          <h3>GitHub 커밋</h3>
          <label>
            GitHub token
            <input id="tokenInput" type="password" autocomplete="off" placeholder="fine-grained token: Contents read/write" />
          </label>
          <label>
            브랜치
            <input id="branchInput" value="main" />
          </label>
          <label>
            커밋 메시지
            <input id="commitMessageInput" />
          </label>
          <div class="secret-actions">
            <button id="commitBtn" type="button">GitHub에 커밋</button>
            <a class="button secondary" href="./index.html">학습 화면</a>
          </div>
          <div id="statusBox" class="status">준비됨</div>
        </section>
      </aside>

      <section class="secret-card secret-grid">
        <div class="brand">
          <h2 id="editorTitle">정석을 선택하세요</h2>
          <span id="editorMeta"></span>
        </div>

        <div class="secret-row">
          <label>
            제목
            <input id="titleInput" />
          </label>
          <label>
            파일명
            <input id="filenameInput" />
          </label>
        </div>

        <div class="secret-row">
          <label>
            데이터 폴더명
            <input id="folderInput" />
          </label>
          <label>
            보드 크기
            <input id="boardSizeInput" type="number" min="1" max="19" />
          </label>
        </div>

        <label>
          정석 전체 코멘트
          <textarea id="rootCommentInput" placeholder="정석 전체 설명"></textarea>
        </label>

        <label>
          SGF
          <textarea id="sgfInput" class="sgf-area" spellcheck="false"></textarea>
        </label>

        <div class="secret-actions">
          <button id="parseSgfBtn" type="button" class="secondary">SGF 파싱/수순 코멘트 갱신</button>
          <button id="saveLocalBtn" type="button">현재 정석 저장</button>
        </div>

        <section class="secret-grid">
          <h3>수순별 코멘트</h3>
          <div id="moveComments" class="comment-table"></div>
        </section>
      </section>
    </main>

    <script src="./data/joseki-data.js"></script>
    <script src="./assets/sgf.js"></script>
    <script src="./assets/secret-editor.js"></script>
  </body>
</html>
