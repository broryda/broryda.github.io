<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#12100d" />
    <link rel="stylesheet" href="./assets/styles.css" />
    <title>정석 secret editor</title>
    <style>
      body {
        min-height: 100vh;
        padding: 1rem;
      }

      .secret-shell {
        width: min(100%, 1500px);
        margin: 0 auto;
        display: grid;
        grid-template-columns: 300px minmax(520px, 1fr) 360px;
        gap: 1rem;
        align-items: start;
      }

      .secret-card {
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 1rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      }

      .secret-grid {
        display: grid;
        gap: 0.9rem;
      }

      .secret-card h1,
      .secret-card h2,
      .secret-card h3 {
        margin-top: 0;
      }

      .secret-list {
        display: grid;
        gap: 0.45rem;
        max-height: 48vh;
        overflow: auto;
        padding-right: 0.25rem;
      }

      .secret-list button {
        text-align: left;
        padding: 0.75rem;
        border-radius: 14px;
        font-size: 0.95rem;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
      }

      .secret-list button.active {
        background: var(--accent);
        color: #1a1005;
      }

      .secret-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .secret-actions button,
      .secret-actions a {
        width: auto;
      }

      .board-editor-card {
        display: grid;
        gap: 0.8rem;
      }

      .editor-board-wrap {
        display: grid;
        place-items: center;
      }

      #editBoard {
        width: min(100%, 82vh);
        aspect-ratio: 1;
        border-radius: 24px;
      }

      .move-tools {
        display: grid;
        gap: 0.65rem;
      }

      .status {
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 14px;
        padding: 0.75rem;
        background: rgba(0, 0, 0, 0.25);
        color: var(--muted);
      }

      .warning {
        color: #ffd18a;
      }

      .current-move-box {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 0.9rem;
        background: rgba(0, 0, 0, 0.16);
      }

      .comment-list {
        display: grid;
        gap: 0.6rem;
        max-height: 48vh;
        overflow: auto;
        padding-right: 0.25rem;
      }

      .comment-item {
        display: grid;
        gap: 0.45rem;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 0.7rem;
        background: rgba(255, 255, 255, 0.03);
      }

      .comment-item.active {
        border-color: rgba(247, 184, 89, 0.75);
      }

      .comment-item button {
        width: 100%;
        text-align: left;
        padding: 0.55rem 0.7rem;
        border-radius: 12px;
      }

      .comment-item textarea,
      #currentCommentInput,
      #rootCommentInput {
        min-height: 5rem;
      }

      @media (max-width: 1180px) {
        .secret-shell {
          grid-template-columns: 1fr;
        }

        #editBoard {
          width: min(100%, 92vw);
        }
      }
    </style>
  </head>
  <body>
    <main class="secret-shell">
      <aside class="secret-card secret-grid">
        <div class="brand">
          <h1>Secret 편집</h1>
          <span>정석 선택 후 바둑판에 직접 수순을 놓습니다.</span>
        </div>

        <p class="muted small warning">
          URL을 아는 사람은 접근하고 수정할 수 있는 관리자용 페이지입니다. Apps Script URL이 자동 입력됩니다.
        </p>

        <label>
          종류별 정석
          <select id="categorySelect"></select>
        </label>

        <label>
          정석 검색
          <input id="searchInput" placeholder="번호, 제목, 파일명 검색" />
        </label>

        <div id="josekiList" class="secret-list"></div>

        <div class="secret-actions">
          <button id="newJosekiBtn" type="button" class="secondary">새 정석 추가</button>
        </div>

        <section class="secret-grid">
          <h3>스프레드시트 저장소</h3>
          <label>
            Apps Script Web App URL
            <input id="sheetEndpointInput" autocomplete="off" placeholder="https://script.google.com/macros/s/.../exec" />
          </label>
          <div class="secret-actions">
            <button id="loadSheetBtn" type="button">시트에서 불러오기</button>
            <button id="saveEntryBtn" type="button">현재 정석 저장</button>
            <button id="uploadAllBtn" type="button" class="secondary">전체 업로드</button>
            <a class="button secondary" href="./index.html">학습 화면</a>
          </div>
          <div id="statusBox" class="status">준비됨</div>
        </section>
      </aside>

      <section class="secret-card board-editor-card">
        <div class="top-bar">
          <div class="brand">
            <h2 id="editorTitle">정석을 선택하세요</h2>
            <span id="editorMeta"></span>
          </div>
          <button id="saveLocalBtn" type="button" class="secondary small-button">브라우저 임시 저장</button>
        </div>

        <div class="editor-board-wrap">
          <svg id="editBoard"></svg>
        </div>

        <div class="move-tools">
          <label class="step-row">
            <span id="moveNumber">수순 0</span>
            <input id="moveSlider" type="range" min="0" value="0" />
          </label>
          <div class="secret-actions">
            <button id="undoMoveBtn" type="button" class="secondary">마지막 수 삭제</button>
            <button id="clearMovesBtn" type="button" class="danger">수순 전체 삭제</button>
          </div>
          <p class="muted small">
            바둑판을 클릭하면 현재 수순 위치 뒤에 다음 색의 돌이 추가됩니다. 중간 수순에서 클릭하면 그 이후 수순은 잘리고 새 수가 들어갑니다.
          </p>
        </div>
      </section>

      <aside class="secret-card secret-grid">
        <div class="brand">
          <h2>코멘트 수정</h2>
          <span id="selectedMoveText">수순을 선택하세요.</span>
        </div>

        <label>
          정석 전체 코멘트
          <textarea id="rootCommentInput" placeholder="정석 전체 설명"></textarea>
        </label>

        <section class="current-move-box secret-grid">
          <h3>현재 수 코멘트</h3>
          <textarea id="currentCommentInput" placeholder="현재 선택된 수의 코멘트"></textarea>
        </section>

        <section class="secret-grid">
          <h3>수순별 코멘트</h3>
          <div id="moveComments" class="comment-list"></div>
        </section>
      </aside>
    </main>

    <script src="./data/joseki-data.js"></script>
    <script src="./assets/sgf.js"></script>
    <script src="./assets/board.js"></script>
    <script src="./assets/secret-editor.js?v=sheet-cms-auto-load-1"></script>
  </body>
</html>
